<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface": "#001b3d",
                    "on-primary": "#ffffff",
                    "error-container": "#ffdad6",
                    "primary-fixed": "#d6e3ff",
                    "surface": "#f8f9fc",
                    "on-secondary": "#ffffff",
                    "secondary-container": "#d6e3fe",
                    "on-secondary-container": "#59657c",
                    "on-surface-variant": "#59657c",
                    "inverse-surface": "#2f3034",
                    "on-tertiary-fixed": "#31073c",
                    "on-tertiary-container": "#d09bd8",
                    "on-primary-container": "#8caee9",
                    "surface-container-highest": "#e2e2e7",
                    "primary-container": "#1a4175",
                    "surface-variant": "#f1f4f9",
                    "on-secondary-fixed": "#0f1c2f",
                    "on-error-container": "#93000a",
                    "primary-fixed-dim": "#a9c7ff",
                    "on-tertiary-fixed-variant": "#61366b",
                    "surface-dim": "#dad9de",
                    "surface-container-high": "#e8e7ed",
                    "surface-container": "#eeedf2",
                    "on-tertiary": "#ffffff",
                    "tertiary-container": "#5b3065",
                    "surface-bright": "#faf9fe",
                    "on-primary-fixed": "#001b3d",
                    "surface-tint": "#3c5f95",
                    "tertiary-fixed-dim": "#ebb4f3",
                    "secondary-fixed-dim": "#bac7e1",
                    "primary": "#002b59",
                    "outline-variant": "#e2e2e7",
                    "tertiary-fixed": "#fcd6ff",
                    "on-primary-fixed-variant": "#21477b",
                    "tertiary": "#43194d",
                    "secondary-fixed": "#d6e3fe",
                    "inverse-primary": "#a9c7ff",
                    "on-error": "#ffffff",
                    "on-background": "#001b3d",
                    "surface-container-low": "#f4f3f8",
                    "error": "#ba1a1a",
                    "surface-container-lowest": "#ffffff",
                    "inverse-on-surface": "#f1f0f5",
                    "outline": "#c3c6d1",
                    "secondary": "#535f75",
                    "background": "#f8f9fc",
                    "on-secondary-fixed-variant": "#3b475d"
            },
            "borderRadius": {
                    "DEFAULT": "0rem",
                    "lg": "0rem",
                    "xl": "0rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Manrope", "Inter"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        * {
            border-radius: 0 !important;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
        body {
            font-family: 'Manrope', sans-serif;
        }
        input {
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
        }
        /* Subpixel accurate rendering for thin borders */
        .border, .border-b, .border-t, .border-l, .border-r {
            transform: translateZ(0);
            backface-visibility: hidden;
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface">
<!-- Background Simulation (Dashboard) -->
<div class="fixed inset-0 z-0 overflow-hidden opacity-40 grayscale pointer-events-none">
<header class="flex justify-between items-center px-4 h-14 w-full bg-white border-b border-outline-variant">
<div class="font-headline font-extrabold tracking-tight text-primary text-lg">Service Terminal</div>
<div class="w-8 h-8 bg-primary"></div>
</header>
<main class="p-4 grid grid-cols-12 gap-4">
<div class="col-span-12 h-24 bg-white border border-outline-variant"></div>
<div class="col-span-6 h-32 bg-white border border-outline-variant"></div>
<div class="col-span-6 h-32 bg-white border border-outline-variant"></div>
<div class="col-span-12 h-48 bg-white border border-outline-variant"></div>
</main>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-primary/40 backdrop-blur-sm">
<!-- Modal Container -->
<div class="w-full max-w-lg bg-white shadow-2xl border border-outline-variant overflow-hidden">
<!-- Modal Header: Styled as the Page Header -->
<div class="flex items-center justify-between px-4 h-14 border-b border-outline-variant bg-white">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" data-icon="inventory_2">inventory_2</span>
<h2 class="font-headline font-extrabold text-primary text-lg tracking-tight">Add New Spare Part</h2>
</div>
<button class="p-2 text-primary active:opacity-70 transition-opacity">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Modal Content -->
<div class="p-4 space-y-4">
<!-- Form Group: Spare Part Name -->
<div>
<label class="text-[10px] font-bold uppercase tracking-[0.1em] text-on-surface-variant mb-1 block">
                    Spare Part Name
                </label>
<div class="p-3 border border-outline-variant bg-white">
<input class="w-full p-0 text-sm font-bold text-on-surface placeholder:text-outline placeholder:font-medium" placeholder="e.g. Hydraulic Actuator X-1" type="text"/>
</div>
</div>
<!-- Form Group: Storage Box Number -->
<div>
<label class="text-[10px] font-bold uppercase tracking-[0.1em] text-on-surface-variant mb-1 block">
                    Storage Box Number
                </label>
<div class="p-3 border border-outline-variant bg-white">
<input class="w-full p-0 text-sm font-bold text-on-surface placeholder:text-outline placeholder:font-medium" placeholder="BOX-A4-092" type="text"/>
</div>
</div>
<!-- Auxiliary Data -->
<div class="grid grid-cols-2 border border-outline-variant">
<div class="p-3 border-r border-outline-variant bg-white">
<label class="text-[10px] text-on-surface-variant font-bold mb-1 block uppercase">Assigned Station</label>
<p class="text-sm font-bold text-on-surface">STATION-04-B</p>
</div>
<div class="p-3 bg-white">
<label class="text-[10px] text-on-surface-variant font-bold mb-1 block uppercase">Inventory Level</label>
<p class="text-sm font-bold text-on-surface uppercase">Automatic</p>
</div>
</div>
<!-- Action Buttons: Matched to SCREEN_32 Footer -->
<div class="pt-4 space-y-3">
<button class="w-full py-4 bg-primary text-white font-headline font-black text-xs tracking-[0.1em] uppercase active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
                    Create Spare Part
                    <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
<button class="w-full py-4 bg-white border border-primary text-primary font-headline font-black text-xs tracking-[0.1em] uppercase active:scale-[0.98] transition-transform">
                    Discard Draft
                </button>
</div>
</div>
</div>
</div>
<!-- Background Reference Image -->
<div class="fixed bottom-0 right-0 w-64 h-64 opacity-5 pointer-events-none z-10">
<div class="w-full h-full" data-alt="Technical blueprint diagram" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAFeeCazzxe076u71VkTgraE_FFHAl1ybbCTurge-osnrf2PFUQbjj1IrT2rdWr6sgYDJw-6i36hrjhVXabe9ctPNHtY2AnS7TXMLVvEFuCGa--RvRm_y9pA6y5vgeePWd6a0bv3OhtLAjevSAgXSqF5yrKXmzUqNGq-2a__oZXXFJWuOyaWEZeOExfAH7VkemWb1CPwPwuIMHuPs3DyATPTgyy3fpES1a8FpG-xliztKvnjCDqK-1der9nZrf4WD51obO6rAWok18'); background-size: contain; background-repeat: no-repeat; background-position: bottom right;">
</div>
</div>
</body></html>
